apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "selfhost-cloud.name" . }}-{{ .Values.name }}-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - http:
      paths:
      - path: /infrastructure/helm-deployer
        pathType: Prefix
        backend:
          service:
            name: {{ include "selfhost-cloud.name" . }}-{{ .Values.name }}-service-external
            port:
              number: 80
