apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "selfhost-cloud.name" . }}-{{ .Values.name }}-httproute
  namespace: {{ .Values.global.namespace }}
spec:
  {{- $gw := default dict (index .Values "gateway") }}
  {{- $name := default (index $gw "name") "traefik" }}
  {{- $namespace := default (index $gw "namespace") "traefik" }}
  {{- $section := default (index $gw "sectionName") "" }}
  {{- $hostnames := default (index $gw "hostnames") (list) }}
  parentRefs:
  - name: {{ $name }}
    namespace: {{ $namespace }}
    {{- if $section }}
    sectionName: {{ $section }}
    {{- end }}
  {{- if $hostnames }}
  hostnames:
  {{- range $hostnames }}
  - {{ . | quote }}
  {{- end }}
  {{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /infrastructure/helm-deployer
    backendRefs:
    - name: {{ include "selfhost-cloud.name" . }}-{{ .Values.name }}-service-external
      port: 80
