apiVersion: v1
kind: Service
metadata:
  name: {{ include "selfhost-cloud.name" . }}-{{ .Values.name }}-service
  namespace: {{ .Values.global.namespace }}
spec:
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: {{ include "selfhost-cloud.name" . }}-{{ .Values.name }}
