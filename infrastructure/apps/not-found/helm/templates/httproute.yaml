apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "selfhost-cloud.name" . }}-{{ .Values.name }}-httproute
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
  - name: {{ default (index .Values "load-balancer" "gateway" "name") (index .Values "gateway" "name") | quote }}
    namespace: {{ default (index .Values "load-balancer" "gateway" "namespace") (index .Values "gateway" "namespace") | quote }}
    {{ $section := default (index .Values "load-balancer" "gateway" "sectionName") (index .Values "gateway" "sectionName") }}
    {{ if $section }}
    sectionName: {{ $section | quote }}
    {{ end }}
  {{ $hostnames := default (index .Values "load-balancer" "gateway" "hostnames") (index .Values "gateway" "hostnames") }}
  {{ if $hostnames }}
  hostnames:
  {{ range $hostnames }}
  - {{ . | quote }}
  {{ end }}
  {{ end }}

  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "selfhost-cloud.name" . }}-{{ .Values.name }}
      port: 80
