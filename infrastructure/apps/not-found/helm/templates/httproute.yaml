apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "selfhost-cloud.name" . }}-{{ .Values.name }}-httproute
  namespace: {{ .Values.global.namespace }}
spec:
  {{- $gwLocal := .Values.gateway | default dict }}
  {{- $lb := .Values.load-balancer | default dict }}
  {{- $gwParent := $lb.gateway | default dict }}
  {{- $name := default (index $gwParent "name") (index $gwLocal "name") }}
  {{- $namespace := default (index $gwParent "namespace") (index $gwLocal "namespace") }}
  {{- $section := default (index $gwParent "sectionName") (index $gwLocal "sectionName") }}
  {{- $hostnames := default (index $gwParent "hostnames") (index $gwLocal "hostnames") }}
  parentRefs:
  - name: {{ $name | quote }}
    namespace: {{ $namespace | quote }}
    {{- if $section }}
    sectionName: {{ $section | quote }}
    {{- end }}
  {{- if $hostnames }}
  hostnames:
  {{- range $hostnames }}
  - {{ . | quote }}
  {{- end }}
  {{- end }}

  parentRefs:
  - name: {{ $name }}
    namespace: {{ $namespace }}
    {{- if $section }}
    sectionName: {{ $section }}
    {{- end }}
  {{- if $hostnames }}
  hostnames:
  {{- range $hostnames }}
  - {{ . | quote }}
  {{- end }}
  {{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "selfhost-cloud.name" . }}-{{ .Values.name }}
      port: 80
