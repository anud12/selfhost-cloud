apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "selfhost-cloud.name" . }}{{include "selfhost-cloud.name" .}}"-"{{ .Values.name }}-nginx-conf
  namespace: {{ .Values.global.namespace }}
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      # Always return 404 and serve index.html as the response body
      error_page 404 = /index.html;

      location / {
        return 404;
      }

      location = /index.html {
        root /usr/share/nginx/html;
        internal;
      }
    }
