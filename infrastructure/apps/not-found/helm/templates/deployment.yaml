apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{include "selfhost-cloud.name" .}}"-"{{ .Values.name }}-deployment
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{include "selfhost-cloud.name" .}}"-"{{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{include "selfhost-cloud.name" .}}"-"{{ .Values.name }}
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: index-html
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: nginx-conf
        configMap:
          name: {{include "selfhost-cloud.name" .}}"-"{{ .Values.name }}-nginx-conf
      - name: index-html
        configMap:
          name: {{include "selfhost-cloud.name" .}}"-"{{ .Values.name }}-index-html
