apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "selfhost-cloud.name" . }}-{{ .Values.name }}-index-html
  namespace: {{ .Values.global.namespace }}
data:
  index.html: |-
    <!doctype html>
    <html>
      <head>
        <meta charset="utf-8">
        <title>Clock</title>
        <style>body{font-family:Inter,system-ui,Arial,sans-serif;padding:24px;background:#0f1720;color:#e6eef6}h1{font-size:48px}</style>
      </head>
      <body>
        <h1 id="time">--:--:--</h1>
        <script>
          function pad(n){return n.toString().padStart(2,'0')}
          function update(){
            const d=new Date();
            document.getElementById('time').textContent = d.toLocaleString();
          }
          setInterval(update,1000);
          update();
        </script>
      </body>
    </html>
